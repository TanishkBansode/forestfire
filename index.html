<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Fire Model (Drossel–Schwabl)</title>
    <style>

        #sim-wrapper {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* Background applied to wrapper */
            background: radial-gradient(circle at top left, #2c3e50 0%, #1a1a1a 70%);
            color: #e0e0e0;
            margin: 0;
            padding: 1em;
            display: grid;

            /* Grid Layout */
            grid-template-columns: 1fr 1fr;
            grid-template-areas:
                "header header"
                "controls controls"
                "sim sim";
            gap: 1.5em;

            /* Ensure it takes up space but doesn't force full viewport height if embedded */
            min-height: 80vh;
            width: 100%;
            box-sizing: border-box;
        }

        /* Scope headers to the wrapper so we don't style the site's main h1 */
        #sim-wrapper h1, #sim-wrapper h2 {
            text-align: center;
            color: #ffffff;
            margin: 0;
        }
        #sim-wrapper h1 { grid-area: header; }

        /* Sim canvas styling */
        #sim-wrapper .sim-container {
            grid-area: sim;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1em;
            box-sizing: border-box;
            background-color: rgba(42, 42, 42, 0.7);
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            max-width: 80%;
            margin: 0 auto;
            aspect-ratio: 1 / 1;
        }

        #sim-wrapper #forestCanvas {
            image-rendering: pixelated;
            border: 2px solid #555;
            background-color: #000;
            width: 100%; height: 100%;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 1 / 1;
        }

        /* Controls styling */
        #sim-wrapper .controls-container {
            grid-area: controls;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1em;
            padding: 1em;
            background-color: rgba(42, 42, 42, 0.7);
            border-radius: 8px;
            box-sizing: border-box;
        }

        #sim-wrapper .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5em;
        }

        #sim-wrapper .control-group label {
            font-weight: bold;
            font-size: 0.9em;
            color: #c0c0c0;
            text-align: left;
            margin-bottom: 0.2em;
        }

        #sim-wrapper .control-group input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 8px;
            background: #555;
            outline: none;
            opacity: 0.8;
            transition: opacity .2s;
            border-radius: 4px;
        }

        #sim-wrapper .control-group input[type="range"]:hover {
            opacity: 1;
        }

        #sim-wrapper .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #007bff;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
            margin-top: -5px;
        }

        #sim-wrapper .control-group input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #007bff;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
            border: none;
        }

        #sim-wrapper .control-group input[type="number"],
        #sim-wrapper .control-group input[type="text"] {
            padding: 8px; border: 1px solid #555; background-color: #333;
            color: #e0e0e0; border-radius: 4px; font-size: 1em;
        }

        #sim-wrapper .action-buttons {
            display: flex;
            gap: 1em;
            margin-top: 1em;
        }

        #sim-wrapper .action-buttons button {
            flex-grow: 1; padding: 12px; font-size: 1.1em; font-weight: bold;
            border: none; border-radius: 4px; cursor: pointer; transition: background-color 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        #startButton { background-color: #28a745; color: white; }
        #startButton.running { background-color: #dc3545; }
        #resetButton { background-color: #007bff; color: white; }
        #startButton:hover { background-color: #218838; }
        #startButton.running:hover { background-color: #c82333; }
        #resetButton:hover { background-color: #0069d9; }

        #sim-wrapper .toggle-switch {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        #sim-wrapper .toggle-switch label { font-weight: bold; margin: 0; }

        /* Responsive layout */
        @media (max-width: 1000px) {
            #sim-wrapper {
                grid-template-columns: 1fr;
                grid-template-areas: "header" "controls" "sim";
            }

            #sim-wrapper .sim-container { min-height: 0; padding: 0.5em; }
            #forestCanvas { max-height: 400px; max-width: 400px; }
            #sim-wrapper .controls-container { max-width: 100%; margin: 0; border-radius: 0; }

            #sim-wrapper .control-group label {
                text-align: center;
            }
            #sim-wrapper .toggle-switch {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- WRAPPER ADDED HERE -->
    <div id="sim-wrapper">
        <h1>Forest Fire Model (Drossel–Schwabl)</h1>

        <div class="controls-container">
            <div class="control-group">
                <label for="pSlider">Tree Growth Probability (p): <span id="pValue">0.01</span></label>
                <input type="range" id="pSlider" min="0.001" max="0.1" step="0.001" value="0.01">
            </div>
            <div class="control-group">
                <label for="fSlider">Lightning Strike Probability (f): <span id="fValue">0.00001</span></label>
                <input type="range" id="fSlider" min="0.000001" max="0.001" step="0.000001" value="0.00001">
            </div>
            <div class="control-group">
                <label for="speedSlider">Steps per Frame (Growth): <span id="speedValue">1000</span></label>
                <input type="range" id="speedSlider" min="1" max="100000" step="1" value="1000">
            </div>
            <div class="control-group">
                <label for="seedBox">Seed:</label>
                <input type="number" id="seedBox" value="42">
            </div>
            <div class="action-buttons">
                <button id="startButton">Start</button>
                <button id="resetButton">Reset</button>
            </div>
            <div class="toggle-switch">
                <input type="checkbox" id="animateToggle" checked>
                <label for="animateToggle">Animate Fires (Pretty, but SLOW data)</label>
            </div>
        </div>

        <div class="sim-container">
            <canvas id="forestCanvas"></canvas>
        </div>

    </div>
    <!-- END WRAPPER -->

    <script>
        // --- SECTION 1: GLOBAL VARIABLES & CONSTANTS ---
        const GRID_SIZE = 256;
        const STATES = { VACANT: 0, TREE: 1, BURNING: 2 };
        const FIRE_ANIMATION_SPEED = 1;
        const RECENTLY_BURNED_STATE = -1;
        const BURN_DECAY_FRAMES = 15;

        let grid; let isSimulating = false; let isFireActive = false;
        let probabilityP, f_s, stepsPerFrame, seed, animateFires;
        let fireQueue = []; let nextFireQueue = [];


        const canvas = document.getElementById('forestCanvas');
        const ctx = canvas.getContext('2d');

        const pSlider = document.getElementById('pSlider');
        const pValue = document.getElementById('pValue'); const fSlider = document.getElementById('fSlider');
        const fValue = document.getElementById('fValue'); const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue'); const startButton = document.getElementById('startButton');
        const resetButton = document.getElementById('resetButton'); const seedBox = document.getElementById('seedBox');
        const animateToggle = document.getElementById('animateToggle');

        let rng; // PRNG
        function seedableRNG(seedStr) {
             let s = cyrb128(seedStr); let a = s[0], b = s[1], c = s[2], d = s[3]; return function() { a |= 0; b |= 0; c |= 0; d |= 0; let t = (a + b | 0) + d | 0; d = d + 1 | 0; a = b ^ b >>> 9; b = c + (c << 3) | 0; c = (c << 21 | c >>> 11); c = c + t | 0; return (t >>> 0) / 4294967296; }
        }
        function cyrb128(str) {
             let h1=1779033703, h2=3144134277, h3=1013904242, h4=2773480762; for (let i=0, k; i<str.length; i++) { k=str.charCodeAt(i); h1=h2^Math.imul(h1^k,597399067); h2=h3^Math.imul(h2^k,2869860233); h3=h4^Math.imul(h3^k,951274213); h4=h1^Math.imul(h4^k,2716044179); } h1=Math.imul(h3^(h1>>>18),597399067); h2=Math.imul(h4^(h2>>>22),2869860233); h3=Math.imul(h1^(h3>>>17),951274213); h4=Math.imul(h2^(h4>>>19),2716044179); return [(h1^h2^h3^h4)>>>0, (h2^h1)>>>0, (h3^h1)>>>0, (h4^h1)>>>0];
        }
        function getRandomInt(max) { return Math.floor(rng() * max); }

        // --- SECTION 2: EVENT LISTENERS ---
        pSlider.oninput = function() {
             probabilityP = parseFloat(this.value);
             pValue.textContent = probabilityP.toFixed(4);
             const max_f = probabilityP / 10.0;
             fSlider.max = max_f;
             if (f_s > max_f) { f_s = max_f; fSlider.value = f_s; }
             fValue.textContent = f_s.toExponential(2);
        };
        fSlider.oninput = function() {
             f_s = parseFloat(this.value); fValue.textContent = f_s.toExponential(2);
        };
        speedSlider.oninput = function() {
             stepsPerFrame = parseInt(this.value, 10); speedValue.textContent = stepsPerFrame;
        };
        animateToggle.onchange = function() {
             animateFires = this.checked;
        };
        startButton.onclick = function() {
             isSimulating = !isSimulating; if (isSimulating) { this.textContent = 'Stop'; this.classList.add('running'); requestAnimationFrame(mainLoop); } else { this.textContent = 'Start'; this.classList.remove('running'); }
        };
        resetButton.onclick = function() {
             if (isSimulating) { isSimulating = false; startButton.textContent = 'Start'; startButton.classList.remove('running'); }
             initializeSimulation();
        };

        // --- SECTION 3: SIMULATION INITIALIZATION ---
        function initializeSimulation() {
            probabilityP = parseFloat(pSlider.value);
            const max_f = probabilityP / 10.0;
            fSlider.max = max_f;
            if (parseFloat(fSlider.value) > max_f) { fSlider.value = max_f; }
            f_s = parseFloat(fSlider.value); stepsPerFrame = parseInt(speedSlider.value, 10);
            seed = seedBox.value; animateFires = animateToggle.checked;

            pValue.textContent = probabilityP.toFixed(4);
            fValue.textContent = f_s.toExponential(2);
            speedValue.textContent = stepsPerFrame;

            canvas.width = GRID_SIZE;
            canvas.height = GRID_SIZE;

            rng = seedableRNG(seed); grid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(STATES.VACANT));

            isFireActive = false;
            fireQueue = []; nextFireQueue = [];

            drawGrid();
        }

        // --- SECTION 4: CORE SIMULATION LOGIC ---

        function runSimulationSteps() {
             for (let i = 0; i < stepsPerFrame; i++) { const x_g = getRandomInt(GRID_SIZE); const y_g = getRandomInt(GRID_SIZE); if (grid[y_g][x_g] === STATES.VACANT && rng() < probabilityP) { grid[y_g][x_g] = STATES.TREE; } const x_f = getRandomInt(GRID_SIZE); const y_f = getRandomInt(GRID_SIZE); if (grid[y_f][x_f] === STATES.TREE && rng() < f_s) { startFire(x_f, y_f); return; } }
        }
        function startFire(x, y) {
             isFireActive = true; grid[y][x] = STATES.BURNING; fireQueue.push({x: x, y: y});
        }

        function runFireStepAnimated() {
            for (let i = 0; i < FIRE_ANIMATION_SPEED && isFireActive; i++) {
                nextFireQueue = [];
                for (const cell of fireQueue) {
                    for (let dy = -1; dy <= 1; dy++) {
                        for (let dx = -1; dx <= 1; dx++) {
                            if (dx === 0 && dy === 0) continue;
                            const nx = cell.x + dx; const ny = cell.y + dy;
                            if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE && grid[ny][nx] === STATES.TREE) {
                                grid[ny][nx] = STATES.BURNING;
                                nextFireQueue.push({x: nx, y: ny});
                            }
                        }
                    }
                    grid[cell.y][cell.x] = RECENTLY_BURNED_STATE - BURN_DECAY_FRAMES + 1;
                }
                fireQueue = nextFireQueue;
                if (fireQueue.length === 0) { endFire(); }
            }
        }

        function runFireInstantly() {
            while (isFireActive) {
                nextFireQueue = [];
                for (const cell of fireQueue) {
                    for (let dy = -1; dy <= 1; dy++) {
                        for (let dx = -1; dx <= 1; dx++) {
                            if (dx === 0 && dy === 0) continue;
                            const nx = cell.x + dx; const ny = cell.y + dy;
                            if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE && grid[ny][nx] === STATES.TREE) {
                                 grid[ny][nx] = STATES.BURNING;
                                 nextFireQueue.push({x: nx, y: ny});
                             }
                        }
                    }
                    grid[cell.y][cell.x] = RECENTLY_BURNED_STATE - BURN_DECAY_FRAMES + 1;
                }
                fireQueue = nextFireQueue;
                if (fireQueue.length === 0) { endFire(); }
            }
        }

        /** Cleans up after a fire is finished. */
        function endFire() {
            isFireActive = false;

        }

        // --- SECTION 6: RENDERING & MAIN LOOP ---
        const COLORS = {
            [STATES.VACANT]: { r: 30, g: 30, b: 30 },
            [STATES.TREE]:   { r: 34, g: 139, b: 34 },
            AMBER: { r: 255, g: 191, b: 0 }
        };

        function drawGrid() {
            const imageData = ctx.createImageData(GRID_SIZE, GRID_SIZE);
            const data = imageData.data; let dataIndex = 0;
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const state = grid[y][x];
                    let r, g, b;

                    if (state === STATES.BURNING) {
                        const flicker = 150 + getRandomInt(105);
                        r = 255; g = flicker; b = 0;
                    } else if (state <= RECENTLY_BURNED_STATE) {
                        const decayProgress = (state - RECENTLY_BURNED_STATE + 1) / BURN_DECAY_FRAMES;
                        const intensity = 1.0 - decayProgress;
                        r = COLORS.AMBER.r * intensity;
                        g = COLORS.AMBER.g * intensity;
                        b = COLORS.AMBER.b * intensity;
                    } else {
                        const color = (state === STATES.TREE) ? COLORS[STATES.TREE] : COLORS[STATES.VACANT];
                        r = color.r; g = color.g; b = color.b;
                    }

                    data[dataIndex]     = r;
                    data[dataIndex + 1] = g;
                    data[dataIndex + 2] = b;
                    data[dataIndex + 3] = 255;
                    dataIndex += 4;
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

       function decayRecentlyBurned() {
           for (let y = 0; y < GRID_SIZE; y++) {
               for (let x = 0; x < GRID_SIZE; x++) {
                   if (grid[y][x] <= RECENTLY_BURNED_STATE) {
                       grid[y][x]++;
                       if (grid[y][x] > RECENTLY_BURNED_STATE) {
                           grid[y][x] = STATES.VACANT;
                       }
                   }
               }
           }
       }

        /** The main animation loop. */
        function mainLoop() {
            if (!isSimulating) return;
            decayRecentlyBurned();
            if (isFireActive) {
                if (animateFires) { runFireStepAnimated(); } else { runFireInstantly(); }
            } else {
                runSimulationSteps();
            }
            drawGrid();
            requestAnimationFrame(mainLoop);
        }

        // --- SECTION 7: STARTUP ---
        initializeSimulation();
    </script>
    <!-- Note: The standard body closing tag should be outside our wrapper -->
</body>
</html>
