<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Fire Model (Drossel–Schwabl)</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #forestCanvas {
            image-rendering: pixelated;
            width: min(90vw, 90vh);
            height: min(90vw, 90vh);
        }
    </style>
</head>
<body>
    <canvas id="forestCanvas"></canvas>

    <script>
        // --- TUNABLE PARAMETERS ---
        const GRID_SIZE        = 256;
        const PROBABILITY_P    = 0.01;     // Tree growth probability per step
        const PROBABILITY_F    = 0.00001;  // Lightning strike probability per step
        const STEPS_PER_FRAME  = 1000;     // Growth steps per animation frame
        const ANIMATE_FIRES    = true;     // false = fires resolve instantly each frame
        const SEED             = "42";     // RNG seed (any string)

        // --- CONSTANTS ---
        const STATES = { VACANT: 0, TREE: 1, BURNING: 2 };
        const RECENTLY_BURNED_STATE = -1;
        const BURN_DECAY_FRAMES = 15;

        // --- STATE ---
        let grid, isFireActive, fireQueue, nextFireQueue;
        const canvas = document.getElementById('forestCanvas');
        const ctx = canvas.getContext('2d');

        // --- RNG ---
        let rng;
        function cyrb128(str) {
            let h1=1779033703, h2=3144134277, h3=1013904242, h4=2773480762;
            for (let i=0, k; i<str.length; i++) {
                k=str.charCodeAt(i);
                h1=h2^Math.imul(h1^k,597399067); h2=h3^Math.imul(h2^k,2869860233);
                h3=h4^Math.imul(h3^k,951274213); h4=h1^Math.imul(h4^k,2716044179);
            }
            h1=Math.imul(h3^(h1>>>18),597399067); h2=Math.imul(h4^(h2>>>22),2869860233);
            h3=Math.imul(h1^(h3>>>17),951274213); h4=Math.imul(h2^(h4>>>19),2716044179);
            return [(h1^h2^h3^h4)>>>0,(h2^h1)>>>0,(h3^h1)>>>0,(h4^h1)>>>0];
        }
        function seedableRNG(seedStr) {
            let s=cyrb128(seedStr), a=s[0], b=s[1], c=s[2], d=s[3];
            return function() {
                a|=0; b|=0; c|=0; d|=0;
                let t=(a+b|0)+d|0; d=d+1|0; a=b^b>>>9;
                b=c+(c<<3)|0; c=(c<<21|c>>>11); c=c+t|0;
                return (t>>>0)/4294967296;
            };
        }
        function randInt(max) { return Math.floor(rng() * max); }

        // --- INIT ---
        function init() {
            canvas.width  = GRID_SIZE;
            canvas.height = GRID_SIZE;
            rng = seedableRNG(SEED);
            grid = Array.from({length: GRID_SIZE}, () => new Int16Array(GRID_SIZE));
            isFireActive = false;
            fireQueue = [];
            nextFireQueue = [];
        }

        // --- SIMULATION ---
        function runGrowthSteps() {
            for (let i = 0; i < STEPS_PER_FRAME; i++) {
                const xg = randInt(GRID_SIZE), yg = randInt(GRID_SIZE);
                if (grid[yg][xg] === STATES.VACANT && rng() < PROBABILITY_P)
                    grid[yg][xg] = STATES.TREE;

                const xf = randInt(GRID_SIZE), yf = randInt(GRID_SIZE);
                if (grid[yf][xf] === STATES.TREE && rng() < PROBABILITY_F) {
                    isFireActive = true;
                    grid[yf][xf] = STATES.BURNING;
                    fireQueue.push({x: xf, y: yf});
                    return;
                }
            }
        }

        function spreadFire() {
            nextFireQueue = [];
            for (const cell of fireQueue) {
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = cell.x + dx, ny = cell.y + dy;
                        if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE
                            && grid[ny][nx] === STATES.TREE) {
                            grid[ny][nx] = STATES.BURNING;
                            nextFireQueue.push({x: nx, y: ny});
                        }
                    }
                }
                grid[cell.y][cell.x] = RECENTLY_BURNED_STATE - BURN_DECAY_FRAMES + 1;
            }
            fireQueue = nextFireQueue;
            if (fireQueue.length === 0) isFireActive = false;
        }

        function runFireInstantly() {
            while (isFireActive) spreadFire();
        }

        // --- DECAY ---
        function decayBurned() {
            for (let y = 0; y < GRID_SIZE; y++)
                for (let x = 0; x < GRID_SIZE; x++)
                    if (grid[y][x] <= RECENTLY_BURNED_STATE) {
                        grid[y][x]++;
                        if (grid[y][x] > RECENTLY_BURNED_STATE)
                            grid[y][x] = STATES.VACANT;
                    }
        }

        // --- RENDER ---
        const COLORS = {
            [STATES.VACANT]: [30, 30, 30],
            [STATES.TREE]:   [34, 139, 34],
            AMBER:           [255, 191, 0],
        };

        function draw() {
            const img = ctx.createImageData(GRID_SIZE, GRID_SIZE);
            const d = img.data;
            let i = 0;
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const s = grid[y][x];
                    let r, g, b;
                    if (s === STATES.BURNING) {
                        r = 255; g = 150 + randInt(105); b = 0;
                    } else if (s <= RECENTLY_BURNED_STATE) {
                        const t = 1.0 - (s - RECENTLY_BURNED_STATE + 1) / BURN_DECAY_FRAMES;
                        r = COLORS.AMBER[0] * t;
                        g = COLORS.AMBER[1] * t;
                        b = COLORS.AMBER[2] * t;
                    } else {
                        [r, g, b] = s === STATES.TREE ? COLORS[STATES.TREE] : COLORS[STATES.VACANT];
                    }
                    d[i]=r; d[i+1]=g; d[i+2]=b; d[i+3]=255;
                    i += 4;
                }
            }
            ctx.putImageData(img, 0, 0);
        }

        // --- LOOP ---
        function loop() {
            decayBurned();
            if (isFireActive) {
                ANIMATE_FIRES ? spreadFire() : runFireInstantly();
            } else {
                runGrowthSteps();
            }
            draw();
            requestAnimationFrame(loop);
        }

        init();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
